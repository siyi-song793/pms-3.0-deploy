name: 代码质量与SVG安全扫描
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint 代码规范检查
        run: npm run lint

      - name: TypeScript 类型检查
        run: npx tsc --noEmit

      - name: 扫描并查杀 SVG 恶意链接
        run: |
          mkdir -p scripts
          cat > scripts/svg-escape-scan.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const SVG_DANGER_REGEX = /http:\/\/www\.w3\.org\/2000\/svg(&#39;|&#34;|%27|%22|[\s\S]*?(&#39;|&#34;|%27|%22))+/g;
          const SCAN_EXT = ['.ts','.js','.json','.md','.html','.svg'];
          const EXCLUDE_DIR = ['node_modules','dist','.devcontainer','.git'];
          let dangerCount = 0;

          function scanDir(dir) {
            const files = fs.readdirSync(dir);
            files.forEach(file => {
              const fullPath = path.join(dir, file);
              const stat = fs.statSync(fullPath);
              if (stat.isDirectory()) {
                if (!EXCLUDE_DIR.some(d => fullPath.includes(d))) scanDir(fullPath);
                return;
              }
              if (!SCAN_EXT.some(ext => fullPath.endsWith(ext))) return;
              let content = fs.readFileSync(fullPath, 'utf8');
              const matches = content.match(SVG_DANGER_REGEX);
              if (matches) dangerCount += matches.length;
            });
          }

          scanDir(path.resolve(__dirname, '../'));
          if (dangerCount > 0) {
            console.error(`❌ 发现 ${dangerCount} 个恶意SVG链接，禁止合并！`);
            process.exit(1);
          } else {
            console.log('✅ 无恶意SVG链接');
          }
          EOF
          node scripts/svg-escape-scan.js

      - name: 依赖安全审计
        run: npm audit --production --audit-level=high