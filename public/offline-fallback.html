<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMS3.0 | 离线模式</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { text-align: center; max-width: 400px; }
    h1 { font-size: 24px; margin-bottom: 16px; color: #2E7D32; }
    p { font-size: 14px; color: #666; margin-bottom: 24px; }
    button {
      padding: 12px 24px;
      background: #2E7D32;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #256a29; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📴 当前无网络</h1>
    <p>请检查网络连接后重试，或稍后再打开应用。</p>
    <button onclick="location.reload()">🔄 重新加载</button>
  </div>
</body>
</html>
